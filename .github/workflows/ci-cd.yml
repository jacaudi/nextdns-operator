---
# CI/CD Pipeline for NextDNS Operator
# Runs linting, testing, container builds, and Helm chart publishing
name: CI/CD

"on":
  push:
    branches: [main]
  workflow_dispatch:

# Only allow one release at a time - queue subsequent runs
concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  # Lint YAML, Helm charts, and Go code
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.19.0
    permissions:
      contents: read
    with:
      yaml: true
      helm: true
      go: true
      go-version: '1.25'
      helm-chart-path: 'chart'

  # Run Go tests with coverage
  test:
    uses: jacaudi/github-actions/.github/workflows/component-test.yml@v0.19.0
    permissions:
      contents: read
    with:
      test-framework: 'go'
      go-version: '1.25'
      coverage: true
      coverage-threshold: 70
      test-packages: './internal/controller/... ./internal/nextdns/... ./internal/coredns/...'

  # Manual approval gate - pauses after lint/test until a reviewer approves.
  # Configure the "release" environment in Settings > Environments with
  # required reviewers.
  approve:
    name: Approve Release
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Release approved
        run: echo "Release approved, proceeding with semantic release..."

  # Create semantic version and GitHub release (main branch only)
  release:
    needs: [approve]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: jacaudi/github-actions/.github/workflows/component-semantic-release.yml@v0.19.0
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      use-github-app: true
      extra-plugins: '@semantic-release/changelog @semantic-release/git @semantic-release/exec'
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  # Build multi-arch container images
  container:
    needs: [release]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-container-build.yml@v0.19.0
    permissions:
      contents: read
      packages: write
    with:
      image-name: ${{ github.repository }}
      platforms: 'linux/amd64,linux/arm64'
      version: ${{ needs.release.outputs.new-release-version }}
      tags: |
        ghcr.io/${{ github.repository }}:v${{ needs.release.outputs.new-release-version }}
        ghcr.io/${{ github.repository }}:latest

  # Publish Helm chart to OCI registry
  helm:
    needs: [release]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-helm-publish.yml@v0.19.0
    permissions:
      contents: read
      packages: write
    with:
      chart-name: nextdns-operator
      chart-path: chart
      repository: ${{ github.repository_owner }}/charts
      version: v${{ needs.release.outputs.new-release-version }}
      registry: ghcr.io
      registry-username: ${{ github.repository_owner }}
