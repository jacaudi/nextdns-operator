apiVersion: nextdns.io/v1alpha1
kind: NextDNSCoreDNS
metadata:
  name: home-dns-gateway
  namespace: dns
spec:
  profileRef:
    name: my-profile
  upstream:
    primary: DoT
    deviceName: Home DNS
  deployment:
    replicas: 2
  gateway:
    # gatewayClassName references an external GatewayClass managed by a gateway
    # controller (e.g., Envoy Gateway, Cilium, Istio). If omitted, the operator's
    # default --gateway-class-name is used.
    gatewayClassName: envoy-gateway
    addresses:
      - value: "192.168.1.53"
    annotations:
      external-dns.alpha.kubernetes.io/hostname: dns.example.com
    # infrastructure propagates metadata to resources created by the gateway
    # implementation (e.g., the LoadBalancer Service that Envoy Gateway creates).
    # Use this to pass annotations needed for IP allocation (e.g., Cilium LB IPAM)
    # or labels for resource identification.
    infrastructure:
      annotations:
        lbipam.cilium.io/ips: "192.168.1.53"
      # labels:
      #   app.kubernetes.io/managed-by: nextdns-operator
      # parametersRef:
      #   group: gateway.envoyproxy.io
      #   kind: EnvoyProxy
      #   name: custom-proxy-config
  cache:
    enabled: true
  metrics:
    enabled: true
